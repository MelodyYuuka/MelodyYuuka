name: Update stats

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  push:
    paths:
      - .github/workflows/wakatime.yml

jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: MelodyYuuka/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          COMMIT_BY_ME: "True"
          COMMIT_EMAIL: "81250368+MelodyYuuka@users.noreply.github.com"
          SHOW_UPDATED_DATE: "True"
          SHOW_PROFILE_VIEWS: "False"
          SHOW_COMMIT: "False"
          SHOW_DAYS_OF_WEEK: "False"
          SHOW_OS: "True"
          SHOW_PROJECTS: "False"
          SHOW_SHORT_INFO: "False"
          SHOW_LOC_CHART: "False"
          SHOW_LANGUAGE_PER_REPO: "False"
          SHOW_TOTAL_CODE_TIME: "False"

  github:
    name: Update GitHub stats
    runs-on: ubuntu-latest
    # run after wakatime to avoid commit conflict
    needs: [update-readme]
    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&count_private=true&show_icons=true&bg_color=15,f2f7fd,E0EAFC
          path: static/github-stats.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Generate wakatime card
        uses: stats-organization/github-readme-stats-action@v1
        with:
          card: wakatime
          options: username=MelodyYuyuko&layout=compact&hide_border=true
          path: static/github-stats.svg
          token: ${{ secrets.GH_TOKEN }}

      - run: |
          git config user.name "MelodyYuuka"
          git config user.email "81250368+MelodyYuuka@users.noreply.github.com"
          git add static
          git pull
          git diff-index --quiet HEAD || git commit -m ":bento: update github stats"
          git push
